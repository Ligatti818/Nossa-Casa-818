<title>Nossa Casa</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

:root {
  --green: #1D9E75;
  --green-light: #E1F5EE;
  --green-dark: #085041;
  --amber: #EF9F27;
  --amber-light: #FAEEDA;
  --red: #E24B4A;
  --red-light: #FCEBEB;
  --blue: #378ADD;
  --blue-light: #E6F1FB;
  --blue-dark: #0C447C;
  --pink-light: #FBEAF0;
  --pink-dark: #72243E;
  --bg: #FAFAF8;
  --surface: #FFFFFF;
  --border: rgba(0,0,0,0.10);
  --border-md: rgba(0,0,0,0.16);
  --text: #1A1A18;
  --muted: #6B6B68;
  --hint: #A0A09D;
  --radius: 12px;
  --radius-sm: 8px;
  --radius-pill: 20px;
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg: #141412;
    --surface: #1E1E1C;
    --border: rgba(255,255,255,0.10);
    --border-md: rgba(255,255,255,0.18);
    --text: #F0EFE9;
    --muted: #9A9A97;
    --hint: #5C5C5A;
    --green-light: #0A2E22;
    --amber-light: #2E2208;
    --red-light: #2E1010;
    --blue-light: #0A1E33;
    --pink-light: #2A0F1A;
  }
}

html, body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  min-height: -webkit-fill-available;
  overscroll-behavior: none;
}

.app {
  max-width: 480px;
  margin: 0 auto;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  padding-bottom: calc(72px + env(safe-area-inset-bottom));
}

/* HEADER */
.header {
  padding: 56px 20px 16px;
  background: var(--surface);
  border-bottom: 0.5px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 10;
}
.header-top { display: flex; align-items: center; justify-content: space-between; }
.header-logo {
  display: flex; align-items: center; gap: 10px;
}
.logo-icon {
  width: 36px; height: 36px; background: var(--green);
  border-radius: 10px; display: flex; align-items: center; justify-content: center;
}
.logo-icon svg { width: 20px; height: 20px; fill: white; }
.app-name { font-family: 'DM Serif Display', serif; font-size: 20px; color: var(--text); }
.date-pill {
  font-size: 12px; color: var(--muted); background: var(--bg);
  padding: 5px 12px; border-radius: var(--radius-pill);
  border: 0.5px solid var(--border);
}

/* BOTTOM NAV */
.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--surface);
  border-top: 0.5px solid var(--border);
  display: flex;
  padding-bottom: env(safe-area-inset-bottom);
  z-index: 100;
}
.nav-item {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  padding: 10px 4px 8px; gap: 4px; cursor: pointer;
  border: none; background: none; color: var(--hint);
  font-family: 'DM Sans', sans-serif; font-size: 10px;
  transition: color 0.15s;
}
.nav-item.active { color: var(--green); }
.nav-item svg { width: 22px; height: 22px; fill: currentColor; }

/* CONTENT */
.content { flex: 1; padding: 16px; }
.section { display: none; }
.section.active { display: block; }

/* STATS */
.stats-row {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 8px; margin-bottom: 16px;
}
.stat-card {
  background: var(--surface); border-radius: var(--radius-sm);
  border: 0.5px solid var(--border); padding: 12px; text-align: center;
}
.stat-num { font-size: 24px; font-weight: 600; color: var(--text); }
.stat-label { font-size: 11px; color: var(--muted); margin-top: 2px; }

/* ADD FORM */
.add-form {
  background: var(--surface); border-radius: var(--radius);
  border: 0.5px solid var(--border); padding: 14px; margin-bottom: 16px;
}
.add-form input, .add-form select {
  width: 100%; padding: 10px 12px; font-size: 15px;
  border: 0.5px solid var(--border-md); border-radius: var(--radius-sm);
  background: var(--bg); color: var(--text); outline: none;
  font-family: 'DM Sans', sans-serif; margin-bottom: 8px;
  -webkit-appearance: none;
}
.add-form input:focus, .add-form select:focus { border-color: var(--green); }
.add-form input::placeholder { color: var(--hint); }
.form-row { display: flex; gap: 8px; }
.form-row select { flex: 1; margin-bottom: 0; }
.btn-primary {
  width: 100%; padding: 12px; background: var(--green); color: white;
  border: none; border-radius: var(--radius-sm); cursor: pointer;
  font-size: 15px; font-weight: 500; font-family: 'DM Sans', sans-serif;
  margin-top: 8px; transition: opacity 0.15s; letter-spacing: 0.01em;
}
.btn-primary:active { opacity: 0.8; transform: scale(0.99); }

/* FILTER PILLS */
.cat-filter { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; overflow-x: auto; padding-bottom: 2px; }
.cat-pill {
  padding: 5px 14px; border-radius: var(--radius-pill); font-size: 13px; cursor: pointer;
  border: 0.5px solid var(--border-md); background: var(--surface); color: var(--muted);
  white-space: nowrap; font-family: 'DM Sans', sans-serif; transition: all 0.15s;
}
.cat-pill.active {
  background: var(--green-light); border-color: var(--green); color: var(--green-dark);
  font-weight: 500;
}

/* ITEMS */
.items-list { display: flex; flex-direction: column; gap: 8px; }
.item-card {
  background: var(--surface); border-radius: var(--radius);
  border: 0.5px solid var(--border); padding: 14px;
  display: flex; align-items: center; gap: 12px;
  transition: all 0.15s;
}
.item-card.done { opacity: 0.45; }
.item-card.done .item-name { text-decoration: line-through; }

.check-btn {
  width: 24px; height: 24px; border-radius: 50%;
  border: 1.5px solid var(--border-md); cursor: pointer;
  flex-shrink: 0; background: none; display: flex;
  align-items: center; justify-content: center; transition: all 0.2s;
}
.check-btn.checked { background: var(--green); border-color: var(--green); }
.check-btn.checked::after {
  content: ''; width: 7px; height: 4px;
  border-left: 2px solid white; border-bottom: 2px solid white;
  transform: rotate(-45deg) translate(1px, -1px); display: block;
}

.item-body { flex: 1; min-width: 0; }
.item-name { font-size: 15px; color: var(--text); line-height: 1.3; }
.item-sub { display: flex; gap: 6px; align-items: center; margin-top: 5px; flex-wrap: wrap; }

.tag {
  font-size: 11px; padding: 2px 9px; border-radius: var(--radius-pill);
  font-weight: 500;
}
.tag-green { background: var(--green-light); color: var(--green-dark); }
.tag-blue { background: var(--blue-light); color: var(--blue-dark); }
.tag-amber { background: var(--amber-light); color: #633806; }
.tag-pink { background: var(--pink-light); color: var(--pink-dark); }
.tag-red { background: var(--red-light); color: #791F1F; }
.tag-gray { background: var(--bg); color: var(--muted); border: 0.5px solid var(--border-md); }

.priority-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.p-alta { background: var(--red); }
.p-media { background: var(--amber); }
.p-baixa { background: var(--green); }

.del-btn {
  border: none; background: none; cursor: pointer;
  color: var(--hint); font-size: 20px; padding: 4px 6px;
  line-height: 1; flex-shrink: 0;
}
.del-btn:active { color: var(--red); }

.empty-state {
  text-align: center; padding: 40px 20px; color: var(--muted); font-size: 15px;
}
.empty-icon { font-size: 32px; margin-bottom: 8px; }

/* NOTES */
.notes-area {
  width: 100%; min-height: 120px; padding: 12px;
  font-size: 15px; font-family: 'DM Sans', sans-serif;
  border: 0.5px solid var(--border-md); border-radius: var(--radius-sm);
  background: var(--bg); color: var(--text); resize: vertical; outline: none;
  line-height: 1.6; margin-bottom: 8px;
}
.notes-area:focus { border-color: var(--green); }

.saved-note {
  background: var(--surface); border: 0.5px solid var(--border);
  border-radius: var(--radius); padding: 14px; margin-bottom: 10px;
}
.note-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.note-date { font-size: 12px; color: var(--muted); }
.note-text { font-size: 14px; color: var(--text); white-space: pre-wrap; line-height: 1.6; }

/* HIST */
.hist-item {
  display: flex; justify-content: space-between; align-items: center;
  padding: 12px 0; border-bottom: 0.5px solid var(--border); gap: 10px;
}
.hist-item:last-child { border-bottom: none; }
.hist-name { font-size: 14px; color: var(--text); flex: 1; }
.hist-right { display: flex; gap: 6px; align-items: center; flex-shrink: 0; }
.hist-date { font-size: 11px; color: var(--hint); }

.section-label {
  font-size: 12px; color: var(--muted); text-transform: uppercase;
  letter-spacing: 0.06em; margin-bottom: 10px; font-weight: 500;
}

/* FOTO DA FAMÍLIA — card fixo no topo das abas */
.family-card {
  position: relative;
  border-radius: var(--radius);
  overflow: hidden;
  margin-bottom: 16px;
  height: 140px;
  border: 0.5px solid var(--border);
}
.family-card img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center 60%;
  display: block;
}
.family-card-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(to top, rgba(0,0,0,0.55) 0%, rgba(0,0,0,0.0) 55%);
  display: flex;
  align-items: flex-end;
  padding: 12px 14px;
  gap: 6px;
}
.family-card-overlay span {
  color: rgba(255,255,255,0.92);
  font-size: 13px;
  font-weight: 500;
  letter-spacing: 0.01em;
}
.family-card-overlay .heart { font-size: 14px; }

/* CALENDÁRIO */
.cal-wrapper { background: var(--surface); border-radius: var(--radius); border: 0.5px solid var(--border); margin-bottom: 14px; overflow: hidden; }
.cal-header { display: flex; align-items: center; justify-content: space-between; padding: 12px 14px 8px; }
.cal-header span { font-size: 15px; font-weight: 600; color: var(--text); }
.cal-nav { background: none; border: none; font-size: 20px; color: var(--primary); padding: 4px 10px; cursor: pointer; border-radius: 8px; }
.cal-nav:active { background: var(--bg); }
.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; padding: 0 8px 12px; }
.cal-dow { text-align: center; font-size: 11px; color: var(--muted); font-weight: 600; padding: 4px 0 6px; }
.cal-day { text-align: center; font-size: 14px; padding: 8px 2px; border-radius: 50%; cursor: pointer; min-width: 36px; min-height: 36px; display: flex; align-items: center; justify-content: center; flex-direction: column; color: var(--text); position: relative; }
.cal-day:active { background: var(--bg); }
.cal-day.today { background: var(--primary); color: white; font-weight: 700; border-radius: 50%; }
.cal-day.has-event::after { content: ''; width: 5px; height: 5px; background: var(--primary); border-radius: 50%; position: absolute; bottom: 3px; left: 50%; transform: translateX(-50%); }
.cal-day.today.has-event::after { background: white; }
.cal-day.other-month { color: var(--muted); opacity: 0.4; }
.cal-day.selected { background: var(--bg); font-weight: 600; border-radius: 50%; }
</style>
</head>

<script>
const DAYS = ['Domingo','Segunda','Terça','Quarta','Quinta','Sexta','Sábado'];
const MONTHS = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
const now = new Date();
document.getElementById('date-badge').textContent = DAYS[now.getDay()] + ', ' + now.getDate() + ' ' + MONTHS[now.getMonth()];

function loadData() {
  try {
    const saved = localStorage.getItem('nossacasa_v1');
    if (saved) return JSON.parse(saved);
  } catch(e) {}
  return {
    compras: [
      {id:1, name:'Arroz 5kg', cat:'Mercado', who:'Ambos', done:false},
      {id:2, name:'Detergente', cat:'Limpeza', who:'Você', done:false},
      {id:3, name:'Pão de forma', cat:'Padaria', who:'Marido', done:false},
    ],
    tarefas: [
      {id:4, name:'Pagar conta de luz', pri:'alta', who:'Marido', done:false},
      {id:5, name:'Agendar dentista', pri:'media', who:'Ambos', done:false},
    ],
    agenda: [
      {id:6, name:'Reunião do condomínio', data:'2026-04-10', who:'Ambos', done:false},
      {id:7, name:'Aniversário da Mãe', data:'2026-04-22', who:'Ambos', done:false},
    ],
    notas: [],
    historico: [],
    nextId: 10,
    filtroCompras: 'Todos',
  };
}

let data = loadData();

function save() {
  try { localStorage.setItem('nossacasa_v1', JSON.stringify(data)); } catch(e) {}
}

function getId() { return data.nextId++; }

function addToHistory(item, tipo) {
  data.historico.unshift({...item, tipo, completedAt: new Date().toLocaleDateString('pt-BR')});
  if (data.historico.length > 60) data.historico.pop();
}

function showTab(tab) {
  if (tab === 'agenda') { setTimeout(renderCal, 50); }
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  document.getElementById('nav-' + tab).classList.add('active');
  render();
}

function addCompra() {
  const v = document.getElementById('inp-compra').value.trim();
  if (!v) return;
  data.compras.push({
    id: getId(), name: v,
    cat: document.getElementById('sel-compra-cat').value,
    who: document.getElementById('sel-compra-who').value,
    done: false
  });
  document.getElementById('inp-compra').value = '';
  save(); render();
}

function addTarefa() {
  const v = document.getElementById('inp-tarefa').value.trim();
  if (!v) return;
  data.tarefas.push({
    id: getId(), name: v,
    pri: document.getElementById('sel-tarefa-pri').value,
    who: document.getElementById('sel-tarefa-who').value,
    done: false
  });
  document.getElementById('inp-tarefa').value = '';
  save(); render();
}

function addEvento() {
  const v = document.getElementById('inp-evento').value.trim();
  if (!v) return;
  data.agenda.push({
    id: getId(), name: v,
    data: document.getElementById('inp-evento-data').value,
    who: document.getElementById('sel-evento-who').value,
    done: false
  });
  document.getElementById('inp-evento').value = '';
  save(); render();
}

function saveNota() {
  const v = document.getElementById('nota-text').value.trim();
  if (!v) return;
  data.notas.unshift({id: getId(), text: v, date: new Date().toLocaleDateString('pt-BR')});
  document.getElementById('nota-text').value = '';
  save(); renderNotas();
}

function toggleItem(tipo, id) {
  const idx = data[tipo].findIndex(x => x.id === id);
  data[tipo][idx].done = !data[tipo][idx].done;
  if (data[tipo][idx].done) addToHistory(data[tipo][idx], tipo);
  save(); render();
}

function delItem(tipo, id) {
  data[tipo] = data[tipo].filter(x => x.id !== id);
  save(); render();
}

function delNota(id) {
  data.notas = data.notas.filter(x => x.id !== id);
  save(); renderNotas();
}

function clearHistorico() {
  data.historico = [];
  save(); renderHistorico();
}

function setFiltroCompras(f) {
  data.filtroCompras = f;
  save(); renderCompras();
}

function formatDate(d) {
  if (!d) return '';
  const [y, m, day] = d.split('-');
  return day + '/' + m + '/' + y;
}

function renderCompras() {
  const cats = ['Todos', ...new Set(data.compras.map(x => x.cat))];
  document.getElementById('compras-filter').innerHTML = cats.map(c =>
    `<button class="cat-pill ${data.filtroCompras === c ? 'active' : ''}" onclick="setFiltroCompras('${c}')">${c}</button>`
  ).join('');

  const total = data.compras.length;
  const done = data.compras.filter(x => x.done).length;
  document.getElementById('compras-stats').innerHTML = `
    <div class="stat-card"><div class="stat-num">${total}</div><div class="stat-label">Total</div></div>
    <div class="stat-card"><div class="stat-num">${total - done}</div><div class="stat-label">Pendentes</div></div>
    <div class="stat-card"><div class="stat-num">${done}</div><div class="stat-label">Comprados</div></div>
  `;

  const list = data.compras.filter(x => data.filtroCompras === 'Todos' || x.cat === data.filtroCompras);
  const el = document.getElementById('compras-list');
  if (!list.length) { el.innerHTML = '<div class="empty-state"><div class="empty-icon">🛒</div>Nenhum item na lista</div>'; return; }
  el.innerHTML = list.map(x => `
    <div class="item-card ${x.done ? 'done' : ''}">
      <button class="check-btn ${x.done ? 'checked' : ''}" onclick="toggleItem('compras',${x.id})"></button>
      <div class="item-body">
        <div class="item-name">${x.name}</div>
        <div class="item-sub">
          <span class="tag tag-green">${x.cat}</span>
          <span class="tag tag-gray">${x.who}</span>
        </div>
      </div>
      <button class="del-btn" onclick="delItem('compras',${x.id})">×</button>
    </div>
  `).join('');
}

function renderTarefas() {
  const total = data.tarefas.length;
  const done = data.tarefas.filter(x => x.done).length;
  document.getElementById('tarefas-stats').innerHTML = `
    <div class="stat-card"><div class="stat-num">${total}</div><div class="stat-label">Total</div></div>
    <div class="stat-card"><div class="stat-num">${total - done}</div><div class="stat-label">Pendentes</div></div>
    <div class="stat-card"><div class="stat-num">${done}</div><div class="stat-label">Feitas</div></div>
  `;
  const el = document.getElementById('tarefas-list');
  if (!data.tarefas.length) { el.innerHTML = '<div class="empty-state"><div class="empty-icon">✅</div>Nenhuma tarefa ainda</div>'; return; }
  const priLabel = {alta: 'Alta', media: 'Média', baixa: 'Baixa'};
  const priTag = {alta: 'tag-red', media: 'tag-amber', baixa: 'tag-green'};
  el.innerHTML = data.tarefas.map(x => `
    <div class="item-card ${x.done ? 'done' : ''}">
      <button class="check-btn ${x.done ? 'checked' : ''}" onclick="toggleItem('tarefas',${x.id})"></button>
      <div class="priority-dot p-${x.pri}"></div>
      <div class="item-body">
        <div class="item-name">${x.name}</div>
        <div class="item-sub">
          <span class="tag ${priTag[x.pri]}">${priLabel[x.pri]}</span>
          <span class="tag tag-gray">${x.who}</span>
        </div>
      </div>
      <button class="del-btn" onclick="delItem('tarefas',${x.id})">×</button>
    </div>
  `).join('');
}

function renderAgenda() {
  const sorted = [...data.agenda].sort((a, b) => (a.data || '') > (b.data || '') ? 1 : -1);
  const el = document.getElementById('agenda-list');
  if (!sorted.length) { el.innerHTML = '<div class="empty-state"><div class="empty-icon">📅</div>Nenhum evento ainda</div>'; return; }
  el.innerHTML = sorted.map(x => `
    <div class="item-card ${x.done ? 'done' : ''}">
      <button class="check-btn ${x.done ? 'checked' : ''}" onclick="toggleItem('agenda',${x.id})"></button>
      <div class="item-body">
        <div class="item-name">${x.name}</div>
        <div class="item-sub">
          ${x.data ? `<span class="tag tag-amber">${formatDate(x.data)}</span>` : ''}
          <span class="tag tag-gray">${x.who}</span>
        </div>
      </div>
      <button class="del-btn" onclick="delItem('agenda',${x.id})">×</button>
    </div>
  `).join('');
}

function renderNotas() {
  const el = document.getElementById('notas-saved');
  if (!data.notas.length) { el.innerHTML = ''; return; }
  el.innerHTML = data.notas.map(n => `
    <div class="saved-note">
      <div class="note-header">
        <span class="note-date">${n.date}</span>
        <button class="del-btn" onclick="delNota(${n.id})">×</button>
      </div>
      <div class="note-text">${n.text}</div>
    </div>
  `).join('');
}

function renderHistorico() {
  const el = document.getElementById('historico-list');
  if (!data.historico.length) { el.innerHTML = '<div class="empty-state"><div class="empty-icon">📋</div>Histórico vazio</div>'; return; }
  const tipoLabel = {compras: 'Compra', tarefas: 'Tarefa', agenda: 'Evento'};
  const tipoTag = {compras: 'tag-green', tarefas: 'tag-blue', agenda: 'tag-amber'};
  el.innerHTML = '<div>' + data.historico.map(h => `
    <div class="hist-item">
      <span class="hist-name">${h.name}</span>
      <div class="hist-right">
        <span class="tag ${tipoTag[h.tipo] || 'tag-gray'}">${tipoLabel[h.tipo] || h.tipo}</span>
        <span class="hist-date">${h.completedAt}</span>
      </div>
    </div>
  `).join('') + '</div>';
}

// CALENDÁRIO
let calDate = new Date();
let calSelected = null;

function renderCal() {
  const now = new Date();
  const year = calDate.getFullYear();
  const month = calDate.getMonth();
  const monthNames = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  document.getElementById('cal-title').textContent = monthNames[month] + ' ' + year;

  const grid = document.getElementById('cal-grid');
  if (!grid) return;
  grid.innerHTML = '';

  // Days of week header
  const dows = ['D','S','T','Q','Q','S','S'];
  dows.forEach(d => {
    const el = document.createElement('div');
    el.className = 'cal-dow';
    el.textContent = d;
    grid.appendChild(el);
  });

  // Get events for dot indicators
  const eventDays = new Set((data.agenda || []).map(e => e.data));

  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const daysInPrev = new Date(year, month, 0).getDate();

  // Prev month days
  for (let i = firstDay - 1; i >= 0; i--) {
    const el = document.createElement('div');
    el.className = 'cal-day other-month';
    el.textContent = daysInPrev - i;
    grid.appendChild(el);
  }

  // Current month days
  for (let d = 1; d <= daysInMonth; d++) {
    const el = document.createElement('div');
    const dateStr = year + '-' + String(month+1).padStart(2,'0') + '-' + String(d).padStart(2,'0');
    let cls = 'cal-day';
    if (d === now.getDate() && month === now.getMonth() && year === now.getFullYear()) cls += ' today';
    if (calSelected === dateStr) cls += ' selected';
    if (eventDays.has(dateStr)) cls += ' has-event';
    el.className = cls;
    el.textContent = d;
    el.onclick = () => { calSelected = dateStr; renderCal(); filterAgendaByDate(dateStr); };
    grid.appendChild(el);
  }

  // Next month fill
  const total = firstDay + daysInMonth;
  const remaining = total % 7 === 0 ? 0 : 7 - (total % 7);
  for (let d = 1; d <= remaining; d++) {
    const el = document.createElement('div');
    el.className = 'cal-day other-month';
    el.textContent = d;
    grid.appendChild(el);
  }
}

function calPrev() { calDate.setMonth(calDate.getMonth() - 1); renderCal(); }
function calNext() { calDate.setMonth(calDate.getMonth() + 1); renderCal(); }

function filterAgendaByDate(dateStr) {
  // Pre-fill the date input with selected date
  const inp = document.getElementById('inp-evento-data');
  if (inp) inp.value = dateStr;
}


function render() {
  renderCompras();
  renderCal();
  renderTarefas();
  renderAgenda();
  renderNotas();
  renderHistorico();
}

document.getElementById('inp-compra').addEventListener('keydown', e => { if (e.key === 'Enter') addCompra(); });
document.getElementById('inp-tarefa').addEventListener('keydown', e => { if (e.key === 'Enter') addTarefa(); });
document.getElementById('inp-evento').addEventListener('keydown', e => { if (e.key === 'Enter') addEvento(); });

render();


</script>
